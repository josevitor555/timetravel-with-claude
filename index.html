<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHRONOS — Time Machine</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Clock ring -->
  <div class="clock-ring" id="clockRing"></div>

  <!-- Vortex transition -->
  <div class="time-vortex" id="vortex">
    <div class="vortex-ring" style="width:100px;height:100px;animation-delay:0s"></div>
    <div class="vortex-ring" style="width:200px;height:200px;animation-delay:0.3s"></div>
    <div class="vortex-ring" style="width:350px;height:350px;animation-delay:0.6s"></div>
    <div class="vortex-text" id="vortexText">⧖ TRAVELING THROUGH TIME ⧗</div>
  </div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo-line">
        <h1>CHRONOS</h1>
      </div>
      <div class="subtitle">✦ Time Travel Machine ✦</div>
    </div>

    <!-- Live Clock -->
    <div class="live-clock" id="liveClock">
      <span class="clock-label" id="clockLabel">◆ PRESENT ◆</span>
      <div id="clock-display">00:00:00</div>
      <div id="date-display">Loading...</div>
    </div>

    <!-- Input Panel -->
    <div class="panel" id="inputPanel">
      <div class="panel-title">✦ Temporal Destination ✦</div>

      <div class="input-row">
        <div class="input-group">
          <label>Day</label>
          <input type="number" id="day" min="1" max="31" placeholder="DD" value="12">
        </div>
        <div class="input-group">
          <label>Month</label>
          <select id="month">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12" selected>December</option>
          </select>
        </div>
        <div class="input-group">
          <label>Year</label>
          <input type="number" id="year" min="-3000" max="2024" placeholder="YYYY" value="1939">
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <label style="margin-bottom:8px;display:block;">Quick Historical Dates</label>
        <div class="quick-dates">
          <button class="quick-btn" onclick="setDate(7,7,1776)">🇺🇸 1776</button>
          <button class="quick-btn" onclick="setDate(28,7,1914)">⚔️ 1914</button>
          <button class="quick-btn" onclick="setDate(1,9,1939)">💣 1939</button>
          <button class="quick-btn" onclick="setDate(20,7,1969)">🌙 1969</button>
          <button class="quick-btn" onclick="setDate(9,11,1989)">🧱 1989</button>
          <button class="quick-btn" onclick="setDate(11,9,2001)">🗽 2001</button>
        </div>
      </div>

      <button class="travel-btn" id="travelBtn" onclick="startTravel()">
        ⧖ &nbsp; START TIME TRAVEL &nbsp; ⧗
      </button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div>
          <div class="result-era" id="resultEra">20th Century</div>
          <div class="result-date-big" id="resultDateBig">01 Jan 1900</div>
        </div>
        <span class="era-badge" id="eraBadge">Modern Era</span>
      </div>
      <div class="result-body">
        <div class="result-section">
          <div class="result-section-title">Historical Summary</div>
          <div class="summary-text typewriter" id="summaryText">
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </div>

        <div class="result-section" id="factsSection">
          <div class="result-section-title">Period Context</div>
          <div class="facts-grid" id="factsGrid"></div>
        </div>

        <div class="result-section" id="atmosphereSection">
          <div class="result-section-title">Period Atmosphere</div>
          <div class="summary-text" id="atmosphereText"></div>
        </div>

      </div>

      <!-- ElevenLabs Audio Bar -->
      <div class="audio-bar" id="audioBar">
        <button class="audio-btn" id="playPauseBtn" onclick="toggleAudio()" disabled
          title="Play narration">▶</button>
        <span class="audio-label">Narration</span>
        <div class="waveform" id="waveform"></div>
        <div class="tts-loading" id="ttsLoading">
          <div class="tts-spinner"></div>
          <span>Synthesizing voice...</span>
        </div>
      </div>

      <button class="return-btn" onclick="returnToPresent()">↩ Return to Present</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
