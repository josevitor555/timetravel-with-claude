<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHRONOS — Máquina do Tempo</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Clock ring -->
  <div class="clock-ring" id="clockRing"></div>

  <!-- Vortex transition -->
  <div class="time-vortex" id="vortex">
    <div class="vortex-ring" style="width:100px;height:100px;animation-delay:0s"></div>
    <div class="vortex-ring" style="width:200px;height:200px;animation-delay:0.3s"></div>
    <div class="vortex-ring" style="width:350px;height:350px;animation-delay:0.6s"></div>
    <div class="vortex-text" id="vortexText">⧖ VIAJANDO NO TEMPO ⧗</div>
  </div>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo-line">
        <h1>CHRONOS</h1>
      </div>
      <div class="subtitle">✦ Máquina de Viagem no Tempo ✦</div>
    </div>

    <!-- Live Clock -->
    <div class="live-clock" id="liveClock">
      <span class="clock-label" id="clockLabel">◆ PRESENTE ◆</span>
      <div id="clock-display">00:00:00</div>
      <div id="date-display">Carregando...</div>
    </div>

    <!-- Input Panel -->
    <div class="panel" id="inputPanel">
      <div class="panel-title">✦ Destino Temporal ✦</div>

      <div class="input-row">
        <div class="input-group">
          <label>Dia</label>
          <input type="number" id="day" min="1" max="31" placeholder="DD" value="12">
        </div>
        <div class="input-group">
          <label>Mês</label>
          <select id="month">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12" selected>Dezembro</option>
          </select>
        </div>
        <div class="input-group">
          <label>Ano</label>
          <input type="number" id="year" min="-3000" max="2024" placeholder="AAAA" value="1939">
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <label style="margin-bottom:8px;display:block;">Datas Históricas Rápidas</label>
        <div class="quick-dates">
          <button class="quick-btn" onclick="setDate(7,7,1776)">🇺🇸 1776</button>
          <button class="quick-btn" onclick="setDate(28,7,1914)">⚔️ 1914</button>
          <button class="quick-btn" onclick="setDate(1,9,1939)">💣 1939</button>
          <button class="quick-btn" onclick="setDate(20,7,1969)">🌙 1969</button>
          <button class="quick-btn" onclick="setDate(9,11,1989)">🧱 1989</button>
          <button class="quick-btn" onclick="setDate(11,9,2001)">🗽 2001</button>
        </div>
      </div>

      <button class="travel-btn" id="travelBtn" onclick="startTravel()">
        ⧖ &nbsp; INICIAR VIAGEM NO TEMPO &nbsp; ⧗
      </button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div>
          <div class="result-era" id="resultEra">Século XX</div>
          <div class="result-date-big" id="resultDateBig">01 Jan 1900</div>
        </div>
        <span class="era-badge" id="eraBadge">Era Moderna</span>
      </div>
      <div class="result-body">
        <div class="result-section">
          <div class="result-section-title">Resumo Histórico</div>
          <div class="summary-text typewriter" id="summaryText">
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </div>

        <div class="result-section" id="factsSection">
          <div class="result-section-title">Contexto da Época</div>
          <div class="facts-grid" id="factsGrid"></div>
        </div>

        <div class="result-section" id="atmosphereSection">
          <div class="result-section-title">Atmosfera do Período</div>
          <div class="summary-text" id="atmosphereText"></div>
        </div>

      </div>

      <!-- ElevenLabs Audio Bar -->
      <div class="audio-bar" id="audioBar">
        <button class="audio-btn" id="playPauseBtn" onclick="toggleAudio()" disabled
          title="Reproduzir narração">▶</button>
        <span class="audio-label">Narração</span>
        <div class="waveform" id="waveform"></div>
        <div class="tts-loading" id="ttsLoading">
          <div class="tts-spinner"></div>
          <span>Sintetizando voz...</span>
        </div>
      </div>

      <button class="return-btn" onclick="returnToPresent()">↩ Retornar ao Presente</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
